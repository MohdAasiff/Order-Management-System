version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/inventory_db
    depends_on:
      - db

  # ✅ ADD THIS FRONTEND SERVICE
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: erp_react_frontend
    ports:
      - "5173:80"  # Maps Nginx port 80 to your local 5173
    depends_on:
      - backend

volumes:
  pgdata: