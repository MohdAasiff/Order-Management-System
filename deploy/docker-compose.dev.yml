version: '3.8'

services:
  # The PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: erp_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # The FastAPI Backend Service
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # This forces the backend to use the local DB container
      - DATABASE_URL=postgresql://admin:password123@db:5432/inventory_db
    depends_on:
      - db

# Use named volumes for PostgreSQL persistence (Mandatory requirement)
volumes:
  pgdata: